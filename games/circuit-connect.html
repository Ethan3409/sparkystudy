<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuit Connect - SparkStudy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --accent: #f59e0b;
            --accent2: #58a6ff;
            --green: #10b981;
            --red: #ef4444;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* ===== UNIVERSAL NAVBAR ===== */
        .sparky-nav {
            position: sticky;
            top: 0;
            z-index: 9000;
            background: rgba(13,17,23,0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid #21262d;
            padding: 0 2rem;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100vw;
            margin-left: calc(-50vw + 50%);
            box-sizing: border-box;
        }
        .sparky-nav .sn-logo {
            font-size: 1.35rem;
            font-weight: 800;
            color: #f59e0b;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }
        .sparky-nav .sn-logo-box {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #f59e0b 0%, #58a6ff 100%);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.95rem;
            color: #0d1117;
        }
        .sparky-nav .sn-links {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        .sparky-nav .sn-link {
            color: #8b949e;
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            transition: color 0.2s, background 0.2s;
            white-space: nowrap;
        }
        .sparky-nav .sn-link:hover {
            color: #e6edf3;
            background: rgba(255,255,255,0.04);
        }
        .sparky-nav .sn-link.sn-active {
            color: #f59e0b;
            background: rgba(245,158,11,0.08);
        }
        .sparky-nav .sn-link.sn-admin {
            display: none;
            color: #f59e0b;
        }
        .sparky-nav .sn-link.sn-logout {
            color: #f85149;
        }
        .sparky-nav .sn-link.sn-logout:hover {
            color: #ff7b72;
            background: rgba(248,81,73,0.08);
        }
        .sparky-nav .sn-burger {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
        }
        .sparky-nav .sn-burger span {
            display: block;
            width: 22px;
            height: 2px;
            background: #8b949e;
            border-radius: 2px;
            transition: all 0.3s;
        }
        @media (max-width: 768px) {
            .sparky-nav .sn-burger { display: flex; }
            .sparky-nav .sn-links {
                display: none;
                position: absolute;
                top: 60px;
                left: 0;
                right: 0;
                background: #0d1117;
                border-bottom: 1px solid #21262d;
                flex-direction: column;
                padding: 0.75rem;
                gap: 0;
            }
            .sparky-nav .sn-links.sn-open { display: flex; }
            .sparky-nav .sn-link { padding: 0.6rem 1rem; width: 100%; border-radius: 6px; }
        }
        /* ===== END UNIVERSAL NAVBAR ===== */

        /* ===== SCREENS ===== */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 60px);
            width: 100%;
            padding: 2rem 1rem;
            overflow-y: auto;
        }

        .screen.active { display: flex; }

        /* ===== LEVEL SELECT ===== */
        .ls-title {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 3rem;
            text-align: center;
        }

        .ls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 1rem;
            max-width: 500px;
            margin-bottom: 2rem;
        }

        .level-btn {
            aspect-ratio: 1;
            border: 2px solid var(--border);
            background: var(--panel);
            color: var(--text);
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            position: relative;
        }

        .level-btn:hover:not(:disabled) {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .level-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .level-stars {
            font-size: 0.7rem;
            margin-top: 0.2rem;
        }

        .back-games-btn {
            margin-top: 3rem;
            padding: 0.75rem 1.5rem;
            background: var(--accent2);
            color: var(--text);
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .back-games-btn:hover {
            background: #3b82f6;
            transform: translateY(-2px);
        }

        /* ===== GAMEPLAY SCREEN ===== */
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            width: 100%;
            max-width: 800px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            background: var(--panel);
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
        }

        .level-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .moves-counter {
            font-size: 1rem;
            color: var(--accent);
            font-weight: 600;
        }

        .control-buttons {
            display: flex;
            gap: 0.75rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.4rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg);
        }

        .btn-primary:hover {
            background: #f59e0b;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--panel);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        /* ===== GRID & SVG ===== */
        .grid-container {
            background: var(--panel);
            padding: 1.5rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            display: inline-block;
        }

        svg {
            display: block;
            background: rgba(0,0,0,0.2);
            border-radius: 0.25rem;
        }

        .tile-group {
            cursor: pointer;
            transition: filter 0.2s;
        }

        .tile-group:hover rect:not(.pipe-line) {
            filter: brightness(1.2);
        }

        .tile-bg {
            fill: var(--panel);
            stroke: var(--border);
            stroke-width: 2;
        }

        .tile-bg.source {
            stroke: var(--green);
            stroke-width: 2;
            filter: drop-shadow(0 0 4px var(--green));
        }

        .tile-bg.load {
            stroke: var(--accent);
            stroke-width: 2;
            filter: drop-shadow(0 0 4px var(--accent));
        }

        .tile-bg.connected {
            filter: drop-shadow(0 0 6px var(--accent));
        }

        .tile-bg.source.connected {
            filter: drop-shadow(0 0 6px var(--green));
        }

        .pipe-line {
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-width: 5;
            fill: none;
            stroke: #4b5563;
            transition: stroke 0.2s;
        }

        .pipe-line.connected {
            stroke: var(--accent);
            filter: drop-shadow(0 0 3px var(--accent));
        }

        .pipe-line.source-connected {
            stroke: var(--green);
            filter: drop-shadow(0 0 3px var(--green));
        }

        .tile-rotate {
            transform-origin: center;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ===== WIN MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--panel);
            border: 2px solid var(--accent);
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
            max-width: 400px;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--green), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-stars {
            font-size: 3rem;
            margin: 1rem 0;
            letter-spacing: 0.2rem;
        }

        .modal-stats {
            font-size: 0.95rem;
            color: #a0aec0;
            margin: 1.5rem 0;
            line-height: 1.6;
        }

        .modal-buttons {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .modal-buttons .btn {
            flex: 1;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .ls-title { font-size: 1.5rem; }
            .ls-grid { grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); }
            .game-header { flex-direction: column; gap: 0.75rem; }
            .grid-container { padding: 1rem; }
            .modal { padding: 1.5rem; max-width: 90%; }
            .modal-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <nav class="sparky-nav">
        <a href="../index.html" class="sn-logo"><div class="sn-logo-box">S</div>SparkStudy</a>
        <button class="sn-burger" onclick="this.nextElementSibling.classList.toggle('sn-open')" aria-label="Menu"><span></span><span></span><span></span></button>
        <div class="sn-links">
            <a href="../dashboard.html" class="sn-link">Dashboard</a><a href="../tools.html" class="sn-link">Tools</a><a href="../games.html" class="sn-link sn-active">Games</a><a href="../worksheets.html" class="sn-link">Worksheets</a><a href="../achievements.html" class="sn-link">Achievements</a><a href="../formula-sheet.html" class="sn-link">Formulas</a><a href="../admin.html" class="sn-link sn-admin">Admin</a>
            <a href="#" onclick="sparkyLogout();return false;" class="sn-link sn-logout">Logout</a>
        </div>
    </nav>

    <!-- AUTH_GUARD -->
    <script>
(function(){var a=localStorage.getItem('sparty_auth');if(!a){window.location.href='../login.html';return;}try{var u=JSON.parse(a);if(!u.email){window.location.href='../login.html';}}catch(e){window.location.href='../login.html';}})();
</script>

    <!-- LEVEL SELECT SCREEN -->
    <div id="levelSelect" class="screen active">
        <h1 class="ls-title">⚡ Circuit Connect</h1>
        <div class="ls-grid" id="levelGrid"></div>
        <a href="../games.html" class="back-games-btn">← Back to Games</a>
    </div>

    <!-- GAMEPLAY SCREEN -->
    <div id="gameplayScreen" class="screen">
        <div class="game-container">
            <div class="game-header">
                <div class="level-title">Level <span id="levelNum"></span></div>
                <div class="moves-counter">Moves: <span id="moveCount">0</span></div>
                <div class="control-buttons">
                    <button class="btn btn-primary" onclick="resetLevel()">Reset</button>
                    <button class="btn btn-secondary" onclick="backToLevelSelect()">Back</button>
                </div>
            </div>
            <div class="grid-container">
                <svg id="gameGrid" width="400" height="400"></svg>
            </div>
        </div>
    </div>

    <!-- WIN MODAL -->
    <div id="winModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-title">Level Complete! 🎉</div>
            <div class="modal-stars" id="modalStars">⭐⭐⭐</div>
            <div class="modal-stats">
                <div>Moves: <span id="modalMoves">-</span></div>
                <div>Optimal: <span id="modalOptimal">-</span></div>
                <div>Rating: <span id="modalRating">Perfect!</span></div>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="resetLevel()">Replay</button>
                <button class="btn btn-primary" onclick="nextLevel()">Next Level</button>
            </div>
        </div>
    </div>

    <script>
        function sparkyLogout(){localStorage.removeItem('sparty_auth');window.location.href='../login.html';}
        (function(){try{var a=JSON.parse(localStorage.getItem('sparty_auth')||'{}');if(a.role==='owner'){var el=document.querySelector('.sn-admin');if(el)el.style.display='inline-block';}}catch(e){}})();

        // ===== GAME STATE =====
        const TILE_TYPES = {
            EMPTY: 'empty',
            STRAIGHT: 'straight',
            CORNER: 'corner',
            TJUNCTION: 'tjunction',
            CROSS: 'cross'
        };

        let gameState = {
            currentLevel: 1,
            grid: [],
            moves: 0,
            sourcePos: null,
            loadPos: null,
            tileSize: 50,
            connected: new Set(),
            levelProgress: JSON.parse(localStorage.getItem('circuitConnect_progress')) || { unlockedLevel: 1, stars: {} }
        };

        // ===== LEVEL DEFINITIONS (10 LEVELS) =====
        const LEVELS = [
            {
                // Level 1: 3x3 - Simple intro, straight connection
                grid: [
                    ['empty', 'empty', 'empty'],
                    ['source', 'straight', 'load'],
                    ['empty', 'empty', 'empty']
                ],
                optimal: 0
            },
            {
                // Level 2: 3x3 - One corner tile
                grid: [
                    ['empty', 'empty', 'empty'],
                    ['source', 'corner-right', 'empty'],
                    ['empty', 'corner-bottom', 'load']
                ],
                optimal: 2
            },
            {
                // Level 3: 3x3 - Two rotations, straight tiles
                grid: [
                    ['empty', 'empty', 'empty'],
                    ['source', 'straight-vertical', 'load'],
                    ['empty', 'empty', 'empty']
                ],
                optimal: 1
            },
            {
                // Level 4: 4x4 - T-junction intro
                grid: [
                    ['empty', 'empty', 'empty', 'empty'],
                    ['source', 'straight', 'tjunction-top', 'load'],
                    ['empty', 'empty', 'straight', 'empty'],
                    ['empty', 'empty', 'empty', 'empty']
                ],
                optimal: 2
            },
            {
                // Level 5: 4x4 - Complex path with corners
                grid: [
                    ['source', 'corner-right', 'empty', 'empty'],
                    ['empty', 'corner-bottom', 'empty', 'empty'],
                    ['empty', 'straight', 'corner-right', 'load'],
                    ['empty', 'empty', 'empty', 'empty']
                ],
                optimal: 3
            },
            {
                // Level 6: 5x5 - Multi-path with T-junction
                grid: [
                    ['empty', 'empty', 'empty', 'empty', 'empty'],
                    ['source', 'straight', 'tjunction-right', 'straight', 'load'],
                    ['empty', 'empty', 'straight', 'empty', 'empty'],
                    ['empty', 'empty', 'corner-bottom', 'empty', 'empty'],
                    ['empty', 'empty', 'load', 'empty', 'empty']
                ],
                optimal: 3
            },
            {
                // Level 7: 5x5 - Longer path, multiple corners
                grid: [
                    ['source', 'corner-right', 'empty', 'empty', 'empty'],
                    ['empty', 'corner-bottom', 'empty', 'empty', 'empty'],
                    ['empty', 'straight', 'corner-right', 'empty', 'empty'],
                    ['empty', 'empty', 'empty', 'corner-bottom', 'empty'],
                    ['empty', 'empty', 'empty', 'straight', 'load']
                ],
                optimal: 4
            },
            {
                // Level 8: 5x5 - Cross and multiple paths
                grid: [
                    ['empty', 'empty', 'empty', 'empty', 'empty'],
                    ['source', 'straight', 'cross', 'straight', 'load'],
                    ['empty', 'empty', 'corner-right', 'empty', 'empty'],
                    ['empty', 'empty', 'corner-bottom', 'empty', 'empty'],
                    ['empty', 'empty', 'load', 'empty', 'empty']
                ],
                optimal: 3
            },
            {
                // Level 9: 6x6 - Complex with dead ends and multiple junctions
                grid: [
                    ['source', 'straight', 'tjunction-right', 'empty', 'empty', 'empty'],
                    ['empty', 'empty', 'corner-bottom', 'empty', 'empty', 'empty'],
                    ['empty', 'empty', 'straight', 'corner-right', 'empty', 'empty'],
                    ['empty', 'empty', 'empty', 'straight', 'corner-right', 'load'],
                    ['empty', 'empty', 'empty', 'empty', 'empty', 'empty'],
                    ['empty', 'empty', 'empty', 'empty', 'empty', 'empty']
                ],
                optimal: 5
            },
            {
                // Level 10: 6x6 - Final challenge with multiple dead ends
                grid: [
                    ['source', 'corner-right', 'empty', 'empty', 'empty', 'empty'],
                    ['empty', 'corner-bottom', 'empty', 'empty', 'empty', 'empty'],
                    ['empty', 'straight', 'tjunction-right', 'empty', 'empty', 'empty'],
                    ['empty', 'empty', 'straight', 'corner-right', 'empty', 'empty'],
                    ['empty', 'empty', 'empty', 'straight', 'corner-right', 'load'],
                    ['empty', 'empty', 'empty', 'empty', 'empty', 'empty']
                ],
                optimal: 6
            }
        ];

        // ===== TILE ROTATION STATE =====
        let tileRotations = {};

        // ===== TILE CLASS & CONNECTIONS =====
        class Tile {
            constructor(type) {
                this.type = type;
                this.rotation = 0; // 0, 90, 180, 270
            }

            getConnections() {
                const baseConnections = {
                    'empty': [],
                    'source': [1], // bottom
                    'load': [3],   // top
                    'straight-horizontal': [0, 2],   // left, right
                    'straight-vertical': [1, 3],     // top, bottom
                    'straight': [0, 2],              // defaults horizontal
                    'corner-right': [0, 1],          // left, bottom
                    'corner-bottom': [1, 2],         // bottom, right
                    'corner-left': [2, 3],           // right, top
                    'corner-top': [3, 0],            // top, left
                    'corner': [0, 1],                // defaults to right
                    'tjunction-right': [0, 1, 2],    // left, bottom, right
                    'tjunction-bottom': [1, 2, 3],   // bottom, right, top
                    'tjunction-left': [2, 3, 0],     // right, top, left
                    'tjunction-top': [3, 0, 1],      // top, left, bottom
                    'tjunction': [0, 1, 2],          // defaults to right orientation
                    'cross': [0, 1, 2, 3]            // all sides
                };

                let connections = baseConnections[this.type] || [];
                if (this.type === 'source' || this.type === 'load' || this.type === 'cross' || this.type === 'empty') {
                    return connections;
                }

                // Rotate connections
                const rotations = this.rotation / 90;
                return connections.map(c => (c + rotations) % 4);
            }

            canRotate() {
                return !['empty', 'source', 'load', 'cross'].includes(this.type);
            }
        }

        // ===== INITIALIZATION =====
        function initGame() {
            renderLevelSelect();
        }

        function renderLevelSelect() {
            const grid = document.getElementById('levelGrid');
            grid.innerHTML = '';

            for (let i = 1; i <= 10; i++) {
                const btn = document.createElement('button');
                btn.className = 'level-btn';
                btn.disabled = i > gameState.levelProgress.unlockedLevel;

                const starsKey = `level_${i}`;
                const stars = gameState.levelProgress.stars[starsKey] || 0;
                const starsDisplay = stars > 0 ? '⭐'.repeat(stars) : '';

                btn.innerHTML = `<div>${i}</div><div class="level-stars">${starsDisplay}</div>`;
                btn.onclick = () => startLevel(i);

                grid.appendChild(btn);
            }
        }

        function startLevel(levelNum) {
            gameState.currentLevel = levelNum;
            gameState.moves = 0;

            const levelData = LEVELS[levelNum - 1];
            const rows = levelData.grid.length;
            const cols = levelData.grid[0].length;

            // Calculate tile size to fit screen
            const maxSize = Math.min(450 / rows, 450 / cols);
            gameState.tileSize = Math.floor(maxSize);

            // Initialize grid with rotations
            gameState.grid = [];
            tileRotations = {};

            for (let r = 0; r < rows; r++) {
                gameState.grid[r] = [];
                for (let c = 0; c < cols; c++) {
                    const typeStr = levelData.grid[r][c];
                    const tile = new Tile(typeStr);

                    // Randomize rotation for solvable tiles
                    if (tile.canRotate()) {
                        tile.rotation = Math.random() * 360 | 0;
                        if (tile.rotation % 90 !== 0) {
                            tile.rotation = (Math.floor(tile.rotation / 90)) * 90;
                        }
                    }

                    gameState.grid[r] = gameState.grid[r] || [];
                    gameState.grid[r][c] = tile;

                    // Track positions
                    if (typeStr === 'source') gameState.sourcePos = [r, c];
                    if (typeStr === 'load') gameState.loadPos = [r, c];

                    tileRotations[`${r}-${c}`] = tile.rotation;
                }
            }

            // Ensure not already solved
            ensureNotSolved();

            // Show gameplay screen
            switchScreen('gameplayScreen');
            document.getElementById('levelNum').textContent = levelNum;
            document.getElementById('moveCount').textContent = '0';

            renderGame();
        }

        function ensureNotSolved() {
            let attempts = 0;
            while (checkWin() && attempts < 20) {
                const solvable = gameState.grid.flat().filter(t => t.canRotate());
                if (solvable.length === 0) break;

                const tile = solvable[Math.floor(Math.random() * solvable.length)];
                const pos = gameState.grid.flat().indexOf(tile);
                const r = Math.floor(pos / gameState.grid[0].length);
                const c = pos % gameState.grid[0].length;

                tile.rotation = (tile.rotation + 90) % 360;
                tileRotations[`${r}-${c}`] = tile.rotation;
                attempts++;
            }
        }

        function renderGame() {
            const rows = gameState.grid.length;
            const cols = gameState.grid[0].length;
            const size = gameState.tileSize;

            const svg = document.getElementById('gameGrid');
            const width = cols * size;
            const height = rows * size;
            svg.setAttribute('width', width);
            svg.setAttribute('height', height);
            svg.innerHTML = '';

            // Update connectivity
            updateConnectivity();

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const tile = gameState.grid[r][c];
                    const x = c * size;
                    const y = r * size;

                    const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    group.classList.add('tile-group');
                    group.setAttribute('data-r', r);
                    group.setAttribute('data-c', c);
                    group.onclick = () => rotateTile(r, c);

                    // Background
                    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    rect.setAttribute('x', x);
                    rect.setAttribute('y', y);
                    rect.setAttribute('width', size);
                    rect.setAttribute('height', size);
                    rect.setAttribute('rx', 4);
                    rect.classList.add('tile-bg');

                    if (tile.type === 'source') rect.classList.add('source');
                    if (tile.type === 'load') rect.classList.add('load');
                    if (gameState.connected.has(`${r}-${c}`)) rect.classList.add('connected');

                    group.appendChild(rect);

                    // Pipe group for rotation
                    const pipeGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    pipeGroup.classList.add('tile-rotate');
                    pipeGroup.setAttribute('transform', `translate(${x + size/2}, ${y + size/2}) rotate(${tile.rotation}) translate(${-size/2}, ${-size/2})`);

                    // Draw pipes based on tile type and rotation
                    drawPipes(pipeGroup, tile, size);

                    group.appendChild(pipeGroup);
                    svg.appendChild(group);
                }
            }
        }

        function drawPipes(group, tile, size) {
            const padding = 5;
            const start = padding;
            const end = size - padding;
            const mid = size / 2;

            const connections = tile.getConnections();

            // Create line elements
            const lines = {
                0: { x1: start, y1: mid, x2: mid, y2: mid },      // left
                1: { x1: mid, y1: start, x2: mid, y2: mid },      // top
                2: { x1: end, y1: mid, x2: mid, y2: mid },        // right
                3: { x1: mid, y1: end, x2: mid, y2: mid }         // bottom
            };

            for (let dir of connections) {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                const coords = lines[dir];
                line.setAttribute('x1', coords.x1);
                line.setAttribute('y1', coords.y1);
                line.setAttribute('x2', coords.x2);
                line.setAttribute('y2', coords.y2);
                line.classList.add('pipe-line');
                group.appendChild(line);
            }
        }

        function rotateTile(r, c) {
            const tile = gameState.grid[r][c];
            if (!tile.canRotate()) return;

            tile.rotation = (tile.rotation + 90) % 360;
            tileRotations[`${r}-${c}`] = tile.rotation;
            gameState.moves++;

            document.getElementById('moveCount').textContent = gameState.moves;
            renderGame();

            if (checkWin()) {
                showWinModal();
            }
        }

        function updateConnectivity() {
            gameState.connected.clear();
            if (!gameState.sourcePos) return;

            const [sr, sc] = gameState.sourcePos;
            const visited = new Set();
            const queue = [[sr, sc]];
            visited.add(`${sr}-${sc}`);

            const directions = [
                [-1, 0, 3], // up, top connection
                [0, 1, 0],  // right, right connection
                [1, 0, 1],  // down, bottom connection
                [0, -1, 2]  // left, left connection
            ];

            while (queue.length > 0) {
                const [r, c] = queue.shift();
                gameState.connected.add(`${r}-${c}`);

                const tile = gameState.grid[r][c];
                const connections = tile.getConnections();

                for (let i = 0; i < directions.length; i++) {
                    if (!connections.includes(i)) continue;

                    const [dr, dc, neighborDir] = directions[i];
                    const nr = r + dr;
                    const nc = c + dc;

                    if (nr < 0 || nr >= gameState.grid.length || nc < 0 || nc >= gameState.grid[0].length) continue;
                    if (visited.has(`${nr}-${nc}`)) continue;

                    const neighbor = gameState.grid[nr][nc];
                    if (neighbor.type === 'empty') continue;
                    if (!neighbor.getConnections().includes(neighborDir)) continue;

                    visited.add(`${nr}-${nc}`);
                    queue.push([nr, nc]);
                }
            }
        }

        function checkWin() {
            if (!gameState.loadPos) return false;
            const [lr, lc] = gameState.loadPos;
            return gameState.connected.has(`${lr}-${lc}`);
        }

        function showWinModal() {
            const levelData = LEVELS[gameState.currentLevel - 1];
            const optimal = levelData.optimal;
            const moves = gameState.moves;

            let stars = 3;
            if (moves > optimal + 2) stars = 2;
            if (moves > optimal + 5) stars = 1;

            const rating = moves === optimal ? 'Perfect!' : (stars >= 2 ? 'Great!' : 'Good try!');
            const starsDisplay = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);

            document.getElementById('modalStars').textContent = starsDisplay;
            document.getElementById('modalMoves').textContent = moves;
            document.getElementById('modalOptimal').textContent = optimal;
            document.getElementById('modalRating').textContent = rating;

            // Save progress
            const key = `level_${gameState.currentLevel}`;
            if (!gameState.levelProgress.stars[key] || gameState.levelProgress.stars[key] < stars) {
                gameState.levelProgress.stars[key] = stars;
            }
            if (gameState.currentLevel >= gameState.levelProgress.unlockedLevel) {
                gameState.levelProgress.unlockedLevel = Math.min(gameState.currentLevel + 1, 10);
            }
            localStorage.setItem('circuitConnect_progress', JSON.stringify(gameState.levelProgress));

            document.getElementById('winModal').classList.add('active');
        }

        function nextLevel() {
            if (gameState.currentLevel < 10) {
                closeWinModal();
                startLevel(gameState.currentLevel + 1);
            } else {
                closeWinModal();
                backToLevelSelect();
            }
        }

        function closeWinModal() {
            document.getElementById('winModal').classList.remove('active');
        }

        function resetLevel() {
            startLevel(gameState.currentLevel);
            closeWinModal();
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function backToLevelSelect() {
            renderLevelSelect();
            switchScreen('levelSelect');
        }

        // Start the game
        initGame();
    </script>
</body>
</html>
